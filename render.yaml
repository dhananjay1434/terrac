# Render Blueprint — dMRV backend + Postgres (one-click deploy).
# In the Render dashboard: New + → Blueprint → point at this repo. Render reads
# this file, provisions the database, builds the Docker image, wires DATABASE_URL,
# and generates the secrets. After the first deploy, set DMRV_ALLOWED_ORIGIN to
# the portal's URL (see the deploy prompt) and redeploy.
#
# Notes:
# - Free tiers: the web service cold-starts (~50s) after inactivity, and the free
#   Postgres is time-limited. Fine for a demo; use paid plans for anything real.
# - The image honors $PORT (Render injects it) and runs Alembic migrations at
#   startup via the FastAPI lifespan. DATABASE_URL from Render is a bare
#   postgresql:// URL; the app normalizes it to +asyncpg automatically (db.py).

services:
  - type: web
    name: dmrv-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dmrv-db
          property: connectionString
      # Required app secrets — Render generates strong random values.
      - key: DMRV_HMAC_SECRET
        generateValue: true
      - key: DMRV_ADMIN_SECRET
        generateValue: true
      # CORS: set to the deployed portal origin after the portal is live, then
      # redeploy. Left as sync:false so Render prompts for it (empty = portal
      # calls will be blocked by CORS until set).
      - key: DMRV_ALLOWED_ORIGIN
        sync: false
      # Play Integrity attestation stays OFF until Google credentials exist.
      - key: DMRV_ATTESTATION_ENFORCED
        value: "0"
      - key: DMRV_ENV
        value: production

databases:
  - name: dmrv-db
    plan: free
    databaseName: dmrv
    user: dmrv
