name: backend-ci

# P0.b — the safety-net gate every later remediation item depends on.
# The `tests` job is the BLOCKING gate: it runs the full backend pytest suite
# on the database-neutral SQLite path (conftest supplies the same env the local
# run uses). The `lint` job is intentionally NON-BLOCKING (continue-on-error)
# until a dedicated ruff-clean pass — `ruff check` currently reports ~100 legacy
# style issues, so making it blocking today would red-gate the whole repo.
# NOT wired yet (deliberately, see docs/REMEDIATION_PLAN_NONUI.md): black
# (unpinned/broken locally), mypy (not configured), and a coverage floor
# (needs a measured baseline first). Postgres migration lane arrives in P0.c.

on:
  push:
    branches: [main, "remediation/**"]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  tests:
    name: pytest (blocking)
    runs-on: ubuntu-latest
    env:
      # CI supplies config through the environment, never a checked-out .env.
      # These MUST match the literals in tests/conftest.py — several tests assert
      # against the exact admin/hmac values (e.g. test_admin_secret.py), so a
      # different value here would fail the suite, not harden it.
      DMRV_DISABLE_DOTENV: "1"
      DMRV_HMAC_SECRET: test-secret
      DMRV_ADMIN_SECRET: test-admin-secret
      # T2.6: the test literals above are intentionally short; allow them past
      # the production secret entropy floor (never set this in production).
      DMRV_ALLOW_WEAK_SECRETS: "1"
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      DMRV_SKIP_MIGRATIONS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify dependency tree is consistent (P0.10)
        run: python -m pip check
      - name: Run test suite
        run: python -m pytest -q

  tests-postgres:
    name: pytest + migrations (Postgres)
    runs-on: ubuntu-latest
    # T3.1: the SQLite `tests` job above is fast and database-neutral; this job
    # is the production-fidelity gate. It runs the suite against a real
    # postgres:16 AND actually applies the Alembic migrations (DMRV_SKIP_MIGRATIONS=0)
    # — the migration-integrity coverage the repo previously lacked. It also does a
    # full downgrade->upgrade round-trip and `alembic check` (models<->migrations
    # drift). Secrets/literals mirror tests/conftest.py exactly.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dmrv
          POSTGRES_PASSWORD: dmrv
          POSTGRES_DB: dmrv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmrv"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DMRV_DISABLE_DOTENV: "1"
      DMRV_HMAC_SECRET: test-secret
      DMRV_ADMIN_SECRET: test-admin-secret
      DMRV_ALLOW_WEAK_SECRETS: "1"
      # asyncpg URL for the app/engine; the sync psycopg2 URL (asyncpg stripped)
      # is what Alembic uses via db.py's DATABASE_URL.replace("+asyncpg","").
      DATABASE_URL: "postgresql+asyncpg://dmrv:dmrv@localhost:5432/dmrv"
      DMRV_SKIP_MIGRATIONS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Alembic upgrade head
        run: python -m alembic upgrade head
      - name: Migration round-trip (downgrade base -> upgrade head)
        run: |
          python -m alembic downgrade base
          python -m alembic upgrade head
      - name: Alembic drift check (models vs migrations)
        run: python -m alembic check
      - name: Run test suite on Postgres
        run: python -m pytest -q

  docker-smoke:
    name: docker image boots (smoke)
    runs-on: ubuntu-latest
    # P3.1: prove the production image actually builds and the app comes up.
    # We boot on a file-backed SQLite (no Postgres service needed) so this is a
    # pure image/startup check — migrations run at startup (init_db) and
    # /api/health does a real SELECT 1, so a 200 means "image built, deps
    # importable, migrations applied, DB reachable". Weak secrets are allowed
    # here exactly as the pytest lane does it; never in production.
    steps:
      - uses: actions/checkout@v4
      - name: Build image (context = backend/)
        run: docker build -t dmrv-api:smoke backend
      - name: Boot container on SQLite
        run: |
          docker run -d --name dmrv-smoke -p 8001:8001 \
            -e DATABASE_URL="sqlite+aiosqlite:////app/smoke.db" \
            -e DMRV_HMAC_SECRET="ci-smoke-hmac-secret" \
            -e DMRV_ADMIN_SECRET="ci-smoke-admin-secret" \
            -e DMRV_ALLOW_WEAK_SECRETS="1" \
            dmrv-api:smoke
      - name: Wait for /api/health to return 200 (max 90s)
        run: |
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8001/api/health || true)
            if [ "$code" = "200" ]; then
              echo "healthy after ${i}s"
              curl -s http://localhost:8001/api/health
              exit 0
            fi
            sleep 1
          done
          echo "::error::container did not become healthy within 90s"
          docker logs dmrv-smoke
          exit 1
      - name: Container logs (always)
        if: always()
        run: docker logs dmrv-smoke || true
      - name: Tear down
        if: always()
        run: docker rm -f dmrv-smoke || true

  lint:
    name: ruff (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.11.5
      - name: Run ruff
        working-directory: backend
        run: python -m ruff check .
